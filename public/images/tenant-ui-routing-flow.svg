<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" rx="10" ry="10"/>

  <!-- User Node -->
  <g transform="translate(50, 175)">
    <rect x="0" y="0" width="160" height="60" rx="5" ry="5" fill="#ffffff" stroke="#333" stroke-width="2" filter="url(#dropShadow)"/>
    <text x="80" y="25" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">User</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">acme.qa.eastus...</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="210" y1="205" x2="250" y2="205" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- App Gateway Node -->
  <g transform="translate(250, 175)">
    <rect x="0" y="0" width="160" height="60" rx="5" ry="5" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" filter="url(#dropShadow)"/>
    <text x="80" y="25" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#0d47a1">App Gateway</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1565c0">(SSL Termination)</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="410" y1="205" x2="450" y2="205" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="430" y="195" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">AGIC Routes</text>

  <!-- Service Node -->
  <g transform="translate(450, 175)">
    <rect x="0" y="0" width="160" height="60" rx="5" ry="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" filter="url(#dropShadow)"/>
    <text x="80" y="25" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#1b5e20">acme-ui-service</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2e7d32">Tenant Ingress</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="610" y1="205" x2="650" y2="205" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Pod Node -->
  <g transform="translate(650, 160)">
    <rect x="0" y="0" width="120" height="90" rx="5" ry="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2" filter="url(#dropShadow)"/>
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#e65100">acme-ui pod</text>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ef6c00">v3.2 Image</text>
    <text x="60" y="65" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ef6c00">Tenant Branding</text>
  </g>

</svg>
